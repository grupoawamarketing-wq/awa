# =============================================================================
# AWA Motos — Nginx WebP Serving (T2.2)
# Adicionar este snippet ao bloco server { } do nginx.conf da loja.
#
# Funcionamento:
#   1. Detecta se o browser aceita WebP via header Accept
#   2. Se arquivo .webp existir no disco, serve o .webp em vez do JPG/PNG
#   3. Fallback transparente para JPG/PNG se .webp não existir
#   4. Header Vary: Accept garante cache correto no CDN/proxy
#
# Pré-requisito: executar o script de conversão primeiro:
#   bash scripts/convert-to-webp.sh
#
# Arquivo: /etc/nginx/sites-available/awamotos.com (ou equivalente)
# =============================================================================

# === WebP detection map ===
# Coloque este bloco FORA do server {}, no contexto http {}:
#
# map $http_accept $webp_suffix {
#     default   "";
#     "~*webp"  ".webp";
# }

# === Dentro do server { } — substitui o location de imagens existente ===

# Imagens de catálogo com servimento WebP automático
location ~* ^/media/catalog/product/(.+)\.(jpe?g|png)$ {
    # Serve .webp se o browser suporta E o arquivo existe
    add_header Vary Accept;

    # Tenta: arquivo.webp (se existir e browser aceita) → arquivo original → 404
    try_files
        /media/catalog/product/$1.$2$webp_suffix
        /media/catalog/product/$1.$2
        =404;

    # Cache de longa duração (imagens de produto são content-addressed)
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Imagens de cache (resize Magento) com WebP
location ~* ^/media/catalog/product/cache/(.+)\.(jpe?g|png)$ {
    add_header Vary Accept;

    try_files
        /media/catalog/product/cache/$1.$2$webp_suffix
        /media/catalog/product/cache/$1.$2
        @magento_cache;

    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Fallback: deixa o Magento gerar o resize (cache miss)
location @magento_cache {
    rewrite ^/media/(.*)$ /index.php?__media__=1 last;
}

# =============================================================================
# INSTRUÇÕES DE INSTALAÇÃO
# =============================================================================
# 1. Copie o bloco "map" para /etc/nginx/nginx.conf dentro do http {}
#
# 2. Adicione os dois location blocks ao arquivo de virtual host
#    (provavelmente /etc/nginx/sites-available/awamotos.com ou
#     /etc/nginx/conf.d/awamotos.conf)
#
# 3. Teste a configuração:
#    sudo nginx -t
#
# 4. Se OK, recarregue o nginx:
#    sudo nginx -s reload
#
# 5. Verifique no browser (F12 → Network → clique em imagem):
#    - Content-Type: image/webp  (para browsers com suporte)
#    - Content-Type: image/jpeg  (para IE/navegadores sem suporte)
#
# 6. Verifique economia no GTmetrix/PageSpeed Insights
#
# =============================================================================
# VERIFICAÇÃO RÁPIDA
# =============================================================================
# Testar se está servindo WebP:
#   curl -s -o /dev/null -w "%{content_type}" -H "Accept: image/webp,image/*" \
#     https://awamotos.com/media/catalog/product/b/a/bau-bauleto.jpg
#   # Esperado: image/webp
#
# Verificar quantidade de WebPs gerados:
#   find pub/media/catalog/product -not -path '*/cache/*' -name '*.webp' | wc -l
#
# =============================================================================

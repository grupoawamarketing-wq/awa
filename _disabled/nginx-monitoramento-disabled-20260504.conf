# Headwind MDM — monitoramento.awamotos.com
# SSL via Let's Encrypt (renovacao automatica)
#
# Para ativar:
#   sudo cp infra/nginx/monitoramento.awamotos.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/monitoramento.awamotos.com.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d monitoramento.awamotos.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
  listen 80;
  server_name monitoramento.awamotos.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name monitoramento.awamotos.com;

  ssl_certificate /etc/letsencrypt/live/monitoramento.awamotos.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/monitoramento.awamotos.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 50M;

  location / {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    proxy_buffering off;
    proxy_cache off;
  }
}

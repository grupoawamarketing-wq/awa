---
# Codacy configuration for AWA Motos (Magento 2 / Ayo Theme)
# The JS files are browser scripts — document, window, console etc. are valid globals.
engines:
  eslint:
    enabled: true
    exclude_paths:
      - "pub/**"
      - "var/**"
      - "generated/**"
      - "vendor/**"
      - "lib/**"
  php_codesniffer:
    enabled: true
    config:
      # Disable Squiz.Operators.ComparisonOperatorUsage:
      # This rule requires `=== TRUE`/`=== FALSE` for all boolean checks,
      # conflicting with Magento 2 / PSR-12 standard patterns.
      # It was causing ~99% (≈5800) of all false-positive issues.
      disable_rules:
        - "Squiz.Operators.ComparisonOperatorUsage"
        - "WordPress.Security.EscapeOutput"

exclude_paths:
  - "pub/**"
  - "var/**"
  - "generated/**"
  - "vendor/**"
  - "vendor.bak*/**"
  - "lib/**"
  - "setup/**"
  - "dev/**"
  - "node_modules/**"
  # CLI/maintenance scripts — não são código de produção web
  - "scripts/**"
  # Extensões de terceiros instaladas em app/code/
  - "app/code/Rokanthemes/**"
  - "app/code/Mirasvit/**"
  - "app/code/Apptrian/**"
  - "app/code/Meta/**"
  # Scripts de setup/migração SQL do ERP — SQLint usa dialeto PostgreSQL, incompatível com MySQL
  - "app/code/GrupoAwamotos/ERPIntegration/scripts/**"
  # Servidor PHP de desenvolvimento local (não é código da aplicação)
  - "phpserver/**"
  # Tema base Rokanthemes (arquivos de terceiro, não editáveis)
  - "app/design/frontend/ayo/**"
  - "app/design/frontend/Magento/**"
  - "app/design/adminhtml/**"
  # CSS compilados do child theme (gerados a partir dos LESS/source)
  - "app/design/frontend/AWA_Custom/ayo_home5_child/web/css/awa-bundle-*.css"
  - "app/design/frontend/AWA_Custom/ayo_home5_child/web/css/awa-bundle-*.unmin.css"
  # Scripts de deploy/manutenção (não são código da aplicação)
  - "*.sh"
  - "tests/**"
  - "optimize-server.sh"
  - "deploy-update.sh"
  - "EXECUTE_SF001_ROLLOUT.sh"
  # Backups e diretórios de build
  - "_backups/**"
  - "______modulos/**"
  - "artifacts/**"
  - "biblioteca/**"
  - "relatorios/**"
  - "dummy-opensearch/**"
  # Documentação e relatórios markdown
  - "*.md"
  - "docs/**"

name: e2e-nightly-full

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-nightly-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 95
    env:
      MCP_VISUAL_UPDATE_BASELINE: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps

      - name: Full MCP visual suite
        working-directory: tests/e2e
        run: npm run test:mcp-visual

      - name: Generate MCP visual report
        working-directory: tests/e2e
        run: npm run report:mcp-visual

      - name: B2B regression suite (all projects)
        working-directory: tests/e2e
        run: npm run test:b2b-regression:all

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nightly-full-artifacts
          path: |
            tests/e2e/test-results/**
            tests/e2e/reports/**
            tests/e2e/playwright-report/**

name: "Visual QA & Lighthouse Gate"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: URL base para auditar (produção, staging ou túnel local)
        required: true
      playwright_config:
        description: Config Playwright dentro de tests/e2e
        required: true
        default: pw-deep-audit.config.ts
      allow_production_validation:
        description: Permitir explicitamente auditoria em awamotos.com
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: visual-quality-${{ github.ref }}
  cancel-in-progress: true

# Fix #3: permissões para step summary em PRs e atualização de commit status
permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  NODE_VERSION: '22'
  PLAYWRIGHT_CONFIG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.playwright_config || 'pw-deep-audit.config.ts' }}
  # PR/push: mais rápido e estável. schedule/manual: auditoria completa.
  LHCI_RUNS: ${{ github.event_name == 'schedule' && '3' || github.event_name == 'workflow_dispatch' && '3' || '1' }}
  PLAYWRIGHT_PROJECT: ${{ github.event_name == 'pull_request' && 'firefox-desktop-1366' || '' }}

jobs:
  playwright:
    name: Playwright visual tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix #4: composite action substitui o bloco Python duplicado
      - name: Resolve and validate BASE_URL
        id: resolve_base_url
        uses: ./.github/actions/resolve-base-url
        with:
          event_name:                  ${{ github.event_name }}
          dispatch_base_url:           ${{ github.event.inputs.base_url }}
          pr_base_url:                 ${{ vars.PLAYWRIGHT_BASE_URL_PR != '' && vars.PLAYWRIGHT_BASE_URL_PR || secrets.PLAYWRIGHT_BASE_URL_PR }}
          push_base_url:               ${{ vars.PLAYWRIGHT_BASE_URL_PUSH != '' && vars.PLAYWRIGHT_BASE_URL_PUSH || secrets.PLAYWRIGHT_BASE_URL_PUSH }}
          nightly_base_url:            ${{ vars.PLAYWRIGHT_BASE_URL_NIGHTLY != '' && vars.PLAYWRIGHT_BASE_URL_NIGHTLY || secrets.PLAYWRIGHT_BASE_URL_NIGHTLY }}
          allow_production_validation: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_production_validation || vars.ALLOW_PRODUCTION_VALIDATION || 'false' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install root dependencies
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
          fi

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps firefox

      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          BASE_URL:                    ${{ steps.resolve_base_url.outputs.resolved_base_url }}
          PLAYWRIGHT_BASE_URL:         ${{ steps.resolve_base_url.outputs.resolved_base_url }}
          # pw-deep-audit.config.ts tem seu próprio guard de produção; precisa do flag explícito
          ALLOW_PRODUCTION_VALIDATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_production_validation || vars.ALLOW_PRODUCTION_VALIDATION || 'false' }}
          MCP_VISUAL_FAIL_ON:          major
          MCP_VISUAL_THRESHOLD:        '0.08'
        run: |
          if [ -n "${PLAYWRIGHT_PROJECT}" ]; then
            echo "Running Playwright project: ${PLAYWRIGHT_PROJECT}"
            npx playwright test --config="${PLAYWRIGHT_CONFIG}" --project="${PLAYWRIGHT_PROJECT}"
          else
            echo "Running full Playwright config"
            npx playwright test --config="${PLAYWRIGHT_CONFIG}"
          fi

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            tests/e2e/reports/
            tests/e2e/screenshots/
            tests/e2e/test-results/
            tests/e2e/test-results-safe/

  axe_core:
    name: axe-core accessibility gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix #4: composite action substitui o bloco Python duplicado
      - name: Resolve and validate BASE_URL
        id: resolve_base_url
        uses: ./.github/actions/resolve-base-url
        with:
          event_name:                  ${{ github.event_name }}
          dispatch_base_url:           ${{ github.event.inputs.base_url }}
          pr_base_url:                 ${{ vars.PLAYWRIGHT_BASE_URL_PR != '' && vars.PLAYWRIGHT_BASE_URL_PR || secrets.PLAYWRIGHT_BASE_URL_PR }}
          push_base_url:               ${{ vars.PLAYWRIGHT_BASE_URL_PUSH != '' && vars.PLAYWRIGHT_BASE_URL_PUSH || secrets.PLAYWRIGHT_BASE_URL_PUSH }}
          nightly_base_url:            ${{ vars.PLAYWRIGHT_BASE_URL_NIGHTLY != '' && vars.PLAYWRIGHT_BASE_URL_NIGHTLY || secrets.PLAYWRIGHT_BASE_URL_NIGHTLY }}
          allow_production_validation: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_production_validation || vars.ALLOW_PRODUCTION_VALIDATION || 'false' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      # Fix #2: axe-core agora está em devDependencies; npm ci já o instala
      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps firefox

      - name: Run axe-core audits
        working-directory: tests/e2e
        env:
          AXE_BASE_URL:   ${{ steps.resolve_base_url.outputs.resolved_base_url }}
          AXE_TIMEOUT_MS: '120000'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { firefox } = require('playwright');
          const axeCore = require('axe-core');

          function normalizeBase(raw) {
            if (!raw) throw new Error('AXE_BASE_URL ausente.');
            return raw.replace(/\/+$/, '');
          }

          function toSafeUrl(rawUrl) {
            const u = new URL(rawUrl);
            const port = u.port ? `:${u.port}` : '';
            return `${u.protocol}//${u.hostname}${port}${u.pathname || '/'}`;
          }

          (async () => {
            const reportDir = path.resolve(process.cwd(), 'reports', 'axe-core');
            fs.mkdirSync(reportDir, { recursive: true });

            const baseUrl = normalizeBase(process.env.AXE_BASE_URL || process.env.BASE_URL || '');
            const timeoutMs = Number.parseInt(process.env.AXE_TIMEOUT_MS || '120000', 10);

            const targets = [
              `${baseUrl}/`,
              `${baseUrl}/bagageiros.html`,
              `${baseUrl}/ret-biz-100-cr-redondo-universal-2220.html`,
            ];

            const browser = await firefox.launch({ headless: true });
            const context = await browser.newContext({
              ignoreHTTPSErrors: true,
              bypassCSP: true,
              viewport: { width: 1366, height: 900 },
              locale: 'pt-BR',
              timezoneId: 'America/Sao_Paulo',
            });

            const auditedAt = new Date().toISOString();
            const results = [];
            let totalViolations = 0;
            let timedOutPages = 0;

            for (const targetUrl of targets) {
              const page = await context.newPage();
              try {
                await page.goto(targetUrl, { waitUntil: 'domcontentloaded', timeout: timeoutMs });
                await page.addScriptTag({ content: axeCore.source });

                const axeResult = await page.evaluate(async () => {
                  return await axe.run(document, {
                    runOnly: { type: 'tag', values: ['wcag2a', 'wcag2aa', 'wcag21aa'] },
                  });
                });

                const violations = (axeResult.violations || []).map((v) => ({
                  id: v.id,
                  impact: v.impact,
                  help: v.help,
                  helpUrl: v.helpUrl,
                  nodeCount: Array.isArray(v.nodes) ? v.nodes.length : 0,
                  nodes: (v.nodes || []).map((n) => ({
                    target: n.target,
                    html: n.html,
                    failureSummary: n.failureSummary,
                  })),
                }));

                totalViolations += violations.length;
                results.push({
                  url: targetUrl,
                  safeUrl: toSafeUrl(targetUrl),
                  violationsCount: violations.length,
                  violations,
                });

                console.log(`[axe-core] ${targetUrl} -> ${violations.length} violação(ões)`);
              } catch (pageError) {
                // Página lenta ou inacessível não aborta o script — registra e continua
                timedOutPages++;
                console.warn(`[axe-core] ${targetUrl} -> ignorada: ${pageError?.message || pageError}`);
                results.push({
                  url: targetUrl,
                  safeUrl: toSafeUrl(targetUrl),
                  violationsCount: 0,
                  error: pageError?.message || String(pageError),
                  skipped: true,
                });
              } finally {
                await page.close().catch(() => {});
              }
            }

            await context.close().catch(() => {});
            await browser.close().catch(() => {});

            const jsonReportPath = path.join(reportDir, 'axe-results.json');
            const mdReportPath  = path.join(reportDir, 'axe-summary.md');

            const payload = { auditedAt, baseUrl, totalUrls: results.length, totalViolations, timedOutPages, results };
            fs.writeFileSync(jsonReportPath, JSON.stringify(payload, null, 2), 'utf8');

            const mdLines = [
              '# Axe Core Accessibility Report',
              '',
              `- Audit time: ${auditedAt}`,
              `- Base URL: ${baseUrl}`,
              `- Total URLs: ${results.length}`,
              `- Pages with timeout/error: ${timedOutPages}`,
              `- Total violations: ${totalViolations}`,
              '',
              '## Pages',
              '',
            ];

            for (const item of results) {
              if (item.skipped) {
                mdLines.push(`- ${item.safeUrl} → ⚠️ skipped (${item.error})`);
              } else {
                mdLines.push(`- ${item.safeUrl} → **${item.violationsCount}** violação(ões)`);
              }
            }

            fs.writeFileSync(mdReportPath, `${mdLines.join('\n')}\n`, 'utf8');

            if (process.env.GITHUB_STEP_SUMMARY) {
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${mdLines.join('\n')}\n`, 'utf8');
            }

            if (totalViolations > 0) {
              console.error(`[axe-core] Falha no gate: ${totalViolations} violação(ões) detectada(s).`);
              process.exit(1);
            }

            console.log(`[axe-core] Gate: ${totalViolations} violações, ${timedOutPages} páginas puladas.`);
          })().catch((error) => {
            console.error(`[axe-core] Execução falhou: ${error?.message || error}`);
            process.exit(2);
          });
          NODE

      - name: Upload axe-core reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-core-reports
          if-no-files-found: ignore
          retention-days: 14
          path: |
            tests/e2e/reports/axe-core/**

  lighthouse:
    name: Lighthouse performance gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix #4: composite action substitui o bloco Python duplicado
      - name: Resolve and validate BASE_URL
        id: resolve_base_url
        uses: ./.github/actions/resolve-base-url
        with:
          event_name:                  ${{ github.event_name }}
          dispatch_base_url:           ${{ github.event.inputs.base_url }}
          pr_base_url:                 ${{ vars.PLAYWRIGHT_BASE_URL_PR != '' && vars.PLAYWRIGHT_BASE_URL_PR || secrets.PLAYWRIGHT_BASE_URL_PR }}
          push_base_url:               ${{ vars.PLAYWRIGHT_BASE_URL_PUSH != '' && vars.PLAYWRIGHT_BASE_URL_PUSH || secrets.PLAYWRIGHT_BASE_URL_PUSH }}
          nightly_base_url:            ${{ vars.PLAYWRIGHT_BASE_URL_NIGHTLY != '' && vars.PLAYWRIGHT_BASE_URL_NIGHTLY || secrets.PLAYWRIGHT_BASE_URL_NIGHTLY }}
          allow_production_validation: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_production_validation || vars.ALLOW_PRODUCTION_VALIDATION || 'false' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Fix #1: instala Chrome explicitamente; expõe CHROME_PATH para o LHCI
      - name: Install Chrome for Lighthouse
        id: setup_chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # collect não lê url: do config file — URLs passadas via --url no CLI
      # PLP e PDP removidas: PAGE_HUNG a partir de runners US → servidor BR; só homepage é confiável em CI
      - name: Run Lighthouse mobile
        env:
          LHCI_BASE_URL: ${{ steps.resolve_base_url.outputs.resolved_base_url }}
          CHROME_PATH:   ${{ steps.setup_chrome.outputs.chrome-path }}
        run: |
          BASE="${LHCI_BASE_URL%/}"
          npx --yes @lhci/cli@0.14.0 collect \
            --url="${BASE}/" \
            --settings.formFactor=mobile \
            --settings.screenEmulation.mobile=true \
            --settings.screenEmulation.width=390 \
            --settings.screenEmulation.height=844 \
            --settings.screenEmulation.deviceScaleFactor=2.75 \
            --settings.throttlingMethod=simulate \
            --settings.chromeFlags="--headless=new --no-sandbox --disable-dev-shm-usage" \
            --numberOfRuns="${LHCI_RUNS:-1}"
          npx --yes @lhci/cli@0.14.0 assert --config=.github/lighthouse/lighthouserc.mobile.cjs
          npx --yes @lhci/cli@0.14.0 upload --config=.github/lighthouse/lighthouserc.mobile.cjs

      - name: Run Lighthouse desktop
        env:
          LHCI_BASE_URL: ${{ steps.resolve_base_url.outputs.resolved_base_url }}
          CHROME_PATH:   ${{ steps.setup_chrome.outputs.chrome-path }}
        run: |
          BASE="${LHCI_BASE_URL%/}"
          npx --yes @lhci/cli@0.14.0 collect \
            --url="${BASE}/" \
            --settings.formFactor=desktop \
            --settings.screenEmulation.mobile=false \
            --settings.screenEmulation.width=1366 \
            --settings.screenEmulation.height=768 \
            --settings.screenEmulation.deviceScaleFactor=1 \
            --settings.throttlingMethod=simulate \
            --settings.chromeFlags="--headless=new --no-sandbox --disable-dev-shm-usage" \
            --numberOfRuns="${LHCI_RUNS:-1}"
          npx --yes @lhci/cli@0.14.0 assert --config=.github/lighthouse/lighthouserc.desktop.cjs
          npx --yes @lhci/cli@0.14.0 upload --config=.github/lighthouse/lighthouserc.desktop.cjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          if-no-files-found: ignore
          retention-days: 14
          path: .lighthouseci/

  quality_gate:
    name: Visual quality gate (PR block)
    if: always()
    needs:
      - playwright
      - lighthouse
      - axe_core
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        shell: bash

    steps:
      - name: Enforce required checks
        env:
          PLAYWRIGHT_RESULT: ${{ needs.playwright.result }}
          LIGHTHOUSE_RESULT: ${{ needs.lighthouse.result }}
          AXE_CORE_RESULT:   ${{ needs.axe_core.result }}
        run: |
          set -euo pipefail

          echo "Playwright: ${PLAYWRIGHT_RESULT}"
          echo "Lighthouse: ${LIGHTHOUSE_RESULT}"
          echo "axe-core:   ${AXE_CORE_RESULT}"

          if [[ "${PLAYWRIGHT_RESULT}" != "success" || "${LIGHTHOUSE_RESULT}" != "success" || "${AXE_CORE_RESULT}" != "success" ]]; then
            echo "::error::Visual quality gate falhou. O PR deve ser bloqueado até todas as verificações passarem."
            exit 1
          fi

          echo "Visual quality gate aprovado."


# Headwind MDM Community (repositorio oficial hmdm-docker)
# Dominio alvo: monitoramento.awamotos.com
#
# Uso:
#   cd infra/headwind
#   cp .env.example .env
#   docker compose up -d

services:
  hmdm-db:
    image: postgres:16-alpine
    container_name: awa-hmdm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASS}
      POSTGRES_DB: ${SQL_BASE}
    volumes:
      - hmdm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_BASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

  hmdm:
    image: headwindmdm/hmdm:0.1.7
    container_name: awa-hmdm
    restart: unless-stopped
    depends_on:
      hmdm-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
      - "0.0.0.0:31000:31000"
    environment:
      SQL_HOST: hmdm-db
      SQL_PORT: 5432
      SQL_BASE: ${SQL_BASE}
      SQL_USER: ${SQL_USER}
      SQL_PASS: ${SQL_PASS}

      PROTOCOL: http
      BASE_DOMAIN: ${BASE_DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      SHARED_SECRET: ${SHARED_SECRET}
      INSTALL_LANGUAGE: ${INSTALL_LANGUAGE}

      HMDM_VARIANT: ${HMDM_VARIANT}
      DOWNLOAD_CREDENTIALS: ${DOWNLOAD_CREDENTIALS}
      HMDM_URL: ${HMDM_URL}
      CLIENT_VERSION: ${CLIENT_VERSION}

      FORCE_RECONFIGURE: ${FORCE_RECONFIGURE}
      # SSL termination handled by Nginx — Tomcat runs plain HTTP
    volumes:
      - hmdm_work:/usr/local/tomcat/work
      - hmdm_config:/usr/local/tomcat/conf/Catalina/localhost

volumes:
  hmdm_db_data:
  hmdm_work:
  hmdm_config:

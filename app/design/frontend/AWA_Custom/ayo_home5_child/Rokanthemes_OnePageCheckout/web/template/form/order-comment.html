<div class="order-comment-block awa-opc-order-comment">
    <label class="label" data-bind="attr: {for: uid}">
        <span data-bind="i18n: 'Observações do pedido'"></span>
    </label>
    <div class="control">
        <textarea class="admin__control-textarea"
                  data-bind="
            value: value,
            valueUpdate: valueUpdate,
            hasFocus: focused,
            attr: {
                name: inputName,
                cols: cols,
                rows: rows,
                'aria-describedby': uid + '-hint',
                placeholder: $t('Ex.: referência da cotação, horário preferencial ou instruções para faturamento'),
                id: uid,
                disabled: disabled
            }"></textarea>
        <span class="awa-field-hint"
              data-bind="attr: {id: uid + '-hint'}, i18n: 'Opcional — visível apenas para nossa equipe comercial e faturamento.'"></span>
    </div>
</div>

<div class="payment-option opc-payment-additional discount-code">
    <div class="payment-option-content" data-role="content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <form class="form form-discount awa-discount-form"
              id="discount-form"
              data-bind="css: {'awa-discount-form--applied': isApplied()}">
            <div class="awa-discount-section-head">
                <span class="awa-discount-section-head__badge" aria-hidden="true" data-bind="i18n: 'Opcional'"></span>
            </div>
            <div class="awa-discount-form__body">
                <div class="payment-option-inner">
                <div class="field awa-discount-field"
                     role="group"
                     aria-labelledby="discount-code-label">
                    <label class="label" id="discount-code-label" for="discount-code">
                        <span data-bind="i18n: 'Cupom de desconto'"></span>
                    </label>
                    <div class="control">
                        <input class="input-text"
                               type="text"
                               id="discount-code"
                               name="discount_code"
                               autocomplete="off"
                               autocapitalize="characters"
                               enterkeyhint="done"
                               inputmode="text"
                               spellcheck="false"
                               data-validate="{'required-entry':true}"
                               data-bind="value: couponCode, attr:{placeholder: $t('Digite seu cupom'), disabled: isApplied(), 'aria-describedby': 'discount-code-hint', 'aria-label': $t('Cupom de desconto')}" />
                        <span id="discount-code-hint" class="awa-field-hint" data-bind="i18n: 'Opcional — informe o código promocional da sua empresa.'"></span>
                        <!-- ko if: isApplied() -->
                        <p class="awa-discount-applied-badge" role="status" aria-live="polite">
                            <span data-bind="i18n: 'Cupom aplicado com sucesso.'"></span>
                        </p>
                        <!-- /ko -->
                    </div>
                </div>
                </div>
                <div class="actions-toolbar awa-discount-form__actions">
                    <div class="primary">
                        <!-- ko ifnot: isApplied() -->
                            <button class="action action-apply"
                                    type="submit"
                                    data-bind="'value': $t('Aplicar cupom'), click: apply, attr: {'aria-label': $t('Aplicar cupom de desconto')}">
                                <span><!-- ko i18n: 'Aplicar cupom'--><!-- /ko --></span>
                            </button>
                        <!-- /ko -->
                        <!-- ko if: isApplied() -->
                            <button class="action action-cancel"
                                    type="submit"
                                    data-bind="'value': $t('Remover cupom'), click: cancel, attr: {'aria-label': $t('Remover cupom de desconto')}">
                                <span><!-- ko i18n: 'Remover cupom'--><!-- /ko --></span>
                            </button>
                        <!-- /ko -->
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

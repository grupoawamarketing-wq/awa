<li id="payment" role="presentation" class="checkout-payment-method" data-bind="fadeVisible: isVisible, blockLoader: isLoading, css: {'payment-virtual' : quoteIsVirtual}">
    <div id="checkout-step-payment"
         class="step-content"
         data-role="content"
         role="tabpanel"
         aria-hidden="false">
        <!-- ko if: (quoteIsVirtual) -->
            <!-- ko foreach: getRegion('customer-email') -->
                <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        <!--/ko-->
        <form id="co-payment-form" class="form payments" novalidate="novalidate">
            <input data-bind="attr: {value: getFormKey()}" type="hidden" name="form_key"/>
            <fieldset class="fieldset">
                <div class="step-title" data-bind="i18n: 'Forma de pagamento'"></div>
                <!-- ko foreach: getRegion('beforeMethods') -->
                    <!-- ko template: getTemplate() --><!-- /ko -->
                <!-- /ko -->
                <div id="checkout-payment-method-load" class="opc-payment" data-bind="visible: isPaymentMethodsAvailable">
                    <!-- ko foreach: getRegion('payment-methods-list') -->
                        <!-- ko template: getTemplate() --><!-- /ko -->
                    <!-- /ko -->
                </div>
                <div class="no-quotes-block awa-checkout-hint"
                     role="status"
                     aria-live="polite"
                     data-bind="visible: isPaymentMethodsAvailable() == false">
                    <svg class="awa-checkout-hint__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <span class="awa-checkout-hint__text" data-bind="i18n: 'Selecione o frete para carregar as formas de pagamento.'"></span>
                </div>
                <!-- ko foreach: getRegion('afterMethods') -->
                    <!-- ko template: getTemplate() --><!-- /ko -->
                <!-- /ko -->
            </fieldset>
        </form>
    </div>
</li>

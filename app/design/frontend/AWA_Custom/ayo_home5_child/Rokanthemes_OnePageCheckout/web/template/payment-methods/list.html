<div if="isPaymentMethodsAvailable()"
     class="items payment-methods">
    <div repeat="foreach: paymentGroupsList, item: '$group'"
         class="payment-group">
        <!-- ko if: showFormShared($group) -->
            <!-- ko foreach: getRegion('billing-address-form-shared') -->
                <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        <!--/ko-->
        <each args="data: getRegion($group().displayArea), as: 'method'" render=""/>
    </div>
</div>
<div ifnot="isPaymentMethodsAvailable()"
     class="no-payments-block awa-checkout-hint"
     role="status"
     aria-live="polite">
    <svg class="awa-checkout-hint__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
    </svg>
    <span class="awa-checkout-hint__text" translate="'Selecione o frete para ver as formas de pagamento'"></span>
</div>

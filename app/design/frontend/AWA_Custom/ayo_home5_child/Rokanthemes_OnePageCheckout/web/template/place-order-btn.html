<div class="actions-toolbar awa-place-order-toolbar">
    <div class="awa-place-order-toolbar__meta">
        <span class="awa-place-order-toolbar__label" data-bind="i18n: 'Total do pedido'"></span>
        <strong class="awa-place-order-toolbar__amount" aria-live="polite"></strong>
    </div>
    <div class="primary">
        <button class="action primary checkout btn-placeorder"
                type="submit"
                data-bind="
                enable: isPlaceOrderActionAllowed(),
                click: placeOrder,
                attr: {
                    title: placeOrderLabel(),
                    'aria-label': placeOrderLabel(),
                    'aria-disabled': !isPlaceOrderActionAllowed() ? 'true' : 'false'
                },
                css: {disabled: !isPlaceOrderActionAllowed()},
                fadeVisible: isVisible
                ">
            <span data-bind="text: placeOrderLabel()"></span>
        </button>
    </div>
</div>

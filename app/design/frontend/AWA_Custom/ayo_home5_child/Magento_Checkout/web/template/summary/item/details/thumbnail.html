<!--
/**
 * AWA: thumbnail do resumo OPC — dimensões via CSS (evita width:0 do KO) + fallback onerror.
 */
-->
<span class="product-image-container">
    <span class="product-image-wrapper">
        <img data-bind="attr: {
                'src': getSrc($parents[1]),
                'alt': getAlt($parents[1]),
                'title': getAlt($parents[1])
            },
            event: { error: onImageError.bind($data, $parents[1]) }"
            loading="eager"
            fetchpriority="high"
            decoding="async"
            width="48"
            height="48"/>
    </span>
</span>

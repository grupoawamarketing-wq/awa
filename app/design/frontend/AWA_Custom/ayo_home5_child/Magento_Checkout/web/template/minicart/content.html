<!--
/**
 * AWA Motos child theme override — ayo_home5_child
 */
-->
<div class="block-title">
    <div class="awa-minicart-title-wrap">
        <strong id="minicart-title">
            <span class="text" translate="'My Cart'"></span>
        </strong>
        <if args="getCartParam('summary_count')">
            <span class="awa-minicart-title-count awa-minicart-items-total">
                <!-- ko if: maxItemsToDisplay < getCartLineItemsCount() -->
                <span translate="'Showing'"></span>
                <span class="count" text="maxItemsToDisplay"></span>
                <span translate="'of'"></span>
                <!-- /ko -->
                <span class="count" text="getCartParam('summary_count')"></span>
                <!-- ko if: getCartLineItemsCount() === 1 -->
                <span translate="'item in cart summary'"></span>
                <!-- /ko -->
                <!-- ko if: getCartLineItemsCount() > 1 -->
                <span translate="'items in cart summary'"></span>
                <!-- /ko -->
            </span>
        </if>
    </div>
    <button type="button"
            id="btn-minicart-close"
            class="action close"
            data-action="close"
            data-bind="
                attr: {
                    title: $t('Close')
                },
                click: closeMinicart()
            ">
        <span translate="'Close'"></span>
    </button>
</div>
<div class="block-content">
    <if args="getCartParam('summary_count')">
        <div data-action="scroll" class="minicart-items-wrapper">
            <ol id="mini-cart" class="minicart-items" data-bind="foreach: { data: getCartItems(), as: 'item' }">
                <each args="$parent.getRegion($parent.getItemRenderer(item.product_type))"
                      render="{name: getTemplate(), data: item, afterRender: function() {$parents[1].initSidebar()}}"
                ></each>
            </ol>
        </div>

        <div id="awa-minicart-addons-mount" class="awa-minicart-addons" data-role="awa-minicart-addons-mount"></div>

        <each args="getRegion('subtotalContainer')" render=""></each>
        <each args="getRegion('extraInfo')" render=""></each>
    </if>

    <ifnot args="getCartParam('summary_count')">
        <div class="awa-minicart-empty" role="status" aria-live="polite" aria-labelledby="minicart-empty-title">
            <div class="awa-minicart-empty__icon" aria-hidden="true">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                    <circle cx="9" cy="20" r="1"></circle>
                    <circle cx="18" cy="20" r="1"></circle>
                    <path d="M3.5 4h2l2.2 10.2a1 1 0 0 0 1 .8h8.6a1 1 0 0 0 1-.8L20 7H7.1"></path>
                </svg>
            </div>
            <strong class="subtitle empty" id="minicart-empty-title" translate="'You have no items in your shopping cart.'"></strong>
            <p class="awa-minicart-empty__hint" data-bind="i18n: 'Browse the catalog or use search to find parts.'"></p>
            <if args="getCartParam('cart_empty_message')">
                <p class="minicart empty text" text="getCartParam('cart_empty_message')"></p>
            </if>
            <div class="actions awa-minicart-empty__actions">
                <div class="primary">
                    <a class="action primary awa-minicart-browse"
                       href="/"
                       data-action="close"
                       data-bind="click: closeMinicart()">
                        <span translate="'Browse our catalog'"></span>
                    </a>
                </div>
                <div class="secondary">
                    <a class="action viewcart btn" data-bind="attr: {href: shoppingCartUrl}">
                        <span translate="'View Cart'"></span>
                    </a>
                </div>
            </div>
        </div>
    </ifnot>

    <if args="getCartParam('summary_count')">
        <div class="actions" if="getCartParam('possible_onepage_checkout')">
            <div class="primary">
                <button
                        id="top-cart-btn-checkout"
                        type="button"
                        class="action primary checkout"
                        data-action="close"
                        data-bind="
                            attr: {
                                title: $t('Proceed to Checkout')
                            },
                            click: closeMinicart(),
                            text: $t('Proceed to Checkout')
                        "
                ></button>
                <div data-bind="html: getCartParam('extra_actions')"></div>
            </div>
        </div>
    </if>
    <div class="actions" if="getCartParam('summary_count')">
        <div class="secondary">
            <a class="action btn viewcart" data-bind="attr: {href: shoppingCartUrl}">
                <span translate="'View Cart'"></span>
            </a>
        </div>
    </div>

    <div id="minicart-widgets" class="minicart-widgets" if="regionHasElements('promotion')">
        <each args="getRegion('promotion')" render=""></each>
    </div>
</div>
<each args="getRegion('sign-in-popup')" render=""></each>

<!--
 * AWA — billing address select with accessible label association.
-->
<div class="field field-select-billing">
    <label class="label" for="billing_address_id">
        <span data-bind="i18n: 'Billing Address'"></span>
    </label>
    <div class="control" data-bind="if: (addressOptions.length > 1)">
        <select id="billing_address_id"
                class="select"
                name="billing_address_id"
                data-bind="
                    options: addressOptions,
                    optionsText: addressOptionsText,
                    value: selectedAddress,
                    event: {change: onAddressChange(selectedAddress())};
                "></select>
    </div>
</div>

<!--
/**
 * PO Number Field Template for Checkout
 * P0-1: Campo para número de pedido de compra (Purchase Order)
 */
-->
<!-- ko if: isFieldVisible() -->
<section class="b2b-po-number-container checkout-block"
         data-awa-component="b2b-po-number"
         data-bind="visible: isFieldVisible()"
         aria-labelledby="b2b-po-number-label">
    <div class="b2b-po-number-wrapper">
        <div class="b2b-po-number-header">
            <label class="label" id="b2b-po-number-label" for="b2b-po-number">
                <span data-bind="text: getLabel()"></span>
            </label>
            <span class="b2b-po-number-badge"
                  data-bind="text: getOptionalLabel()"></span>
        </div>

        <p class="b2b-po-number-description"
           data-bind="text: getHelpText(), attr: { id: getDescriptionId() }"></p>

        <div class="field b2b-po-number-field">
            <div class="control">
                <input type="text"
                       id="b2b-po-number"
                       name="b2b_po_number"
                       class="input-text"
                       maxlength="64"
                       autocomplete="off"
                       spellcheck="false"
                       data-bind="
                           value: poNumber,
                           valueUpdate: 'afterkeydown',
                           attr: {
                               placeholder: getPlaceholder(),
                               'aria-label': getLabel(),
                               'aria-describedby': getAriaDescribedBy()
                           }
                       " />
            </div>
        </div>

        <div class="field-note">
            <span class="note"
                  data-bind="text: getSupportText(), attr: { id: getSupportId() }"></span>
        </div>
    </div>
</section>
<!-- /ko -->

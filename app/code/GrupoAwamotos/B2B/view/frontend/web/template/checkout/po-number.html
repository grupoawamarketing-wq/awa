<!--
/**
 * PO Number Field Template for Checkout
 * P0-1: Campo para número de pedido de compra (Purchase Order)
 */
-->
<!-- ko if: isFieldVisible() -->
<div class="b2b-po-number-container checkout-block"
     data-bind="visible: isFieldVisible()">
    <div class="b2b-po-number-wrapper">
        <div class="field b2b-po-number-field">
            <label class="label" for="b2b-po-number">
                <span data-bind="text: getLabel()"></span>
                <span class="optional">(opcional)</span>
            </label>
            <div class="control">
                <input type="text"
                       id="b2b-po-number"
                       name="b2b_po_number"
                       class="input-text"
                       maxlength="64"
                       data-bind="
                           value: poNumber,
                           valueUpdate: 'afterkeydown',
                           attr: {
                               placeholder: getPlaceholder(),
                               'aria-label': getLabel()
                           }
                       " />
            </div>
            <div class="field-note">
                <span class="note" data-bind="text: getHelpText()"></span>
            </div>
        </div>
    </div>
</div>
<!-- /ko -->

<!--
/**
 * B2B Credit Payment Method Template
 * Includes payment terms, credit info summary, credit validation, and loading states
 * P2-4.4: Loading states for place order
 */
-->
<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label">
            <span data-bind="text: getTitle()"></span>
            <span class="b2b-credit-badge">B2B</span>
        </label>
    </div>

    <div class="payment-method-content" data-bind="css: {'_active': (getCode() == isChecked())}">
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion('billingAdditional') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>

        <!-- Terms: select (multiple) or single display -->
        <!-- ko if: hasMultipleTerms() -->
        <div class="field b2b-payment-terms--select">
            <label class="label" for="b2b-payment-term">
                <span data-bind="i18n: 'Condição de Pagamento'"></span>
            </label>
            <div class="control">
                <select id="b2b-payment-term"
                        name="payment_term"
                        class="select"
                        data-bind="options: getPaymentTerms(),
                                   optionsText: 'label',
                                   optionsValue: 'value',
                                   value: selectedPaymentTerm">
                </select>
            </div>
        </div>
        <!-- /ko -->

        <!-- Credit info: sufficient (green) -->
        <!-- ko if: isCreditSufficient() -->
        <div class="b2b-credit-remaining" role="status">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>
                <span data-bind="i18n: 'Crédito restante após este pedido:'"></span>
                <strong data-bind="text: remainingCreditFormatted()"></strong>
            </span>
        </div>
        <!-- /ko -->

        <!-- Credit info: insufficient (red alert) -->
        <!-- ko ifnot: isCreditSufficient() -->
        <div class="b2b-credit-insufficient" role="alert">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <div>
                <strong data-bind="i18n: 'Crédito insuficiente para este pedido'"></strong>
                <p>
                    <span data-bind="i18n: 'Faltam'"></span>
                    <strong data-bind="text: creditDeficitFormatted()"></strong>
                    <span data-bind="i18n: 'de crédito. Entre em contato com nosso comercial ou escolha outra forma de pagamento.'"></span>
                </p>
            </div>
        </div>
        <!-- /ko -->

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout b2b-place-order-btn"
                        type="submit"
                        data-bind="click: placeOrder,
                                   attr: {title: $t('Confirmar Pedido')},
                                   enable: (getCode() == isChecked()),
                                   css: {
                                       disabled: !isPlaceOrderActionAllowed(),
                                       'b2b-loading': isPlaceOrderInProgress()
                                   }">
                    <!-- ko ifnot: isPlaceOrderInProgress() -->
                    <span data-bind="i18n: 'Confirmar Pedido'"></span>
                    <!-- /ko -->
                    <!-- ko if: isPlaceOrderInProgress() -->
                    <span class="b2b-spinner" aria-hidden="true"></span>
                    <span data-bind="i18n: 'Processando...'"></span>
                    <!-- /ko -->
                </button>
            </div>
        </div>
    </div>
</div>
